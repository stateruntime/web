<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="45%" cy="52%" r="55%">
      <stop offset="0%" stop-color="#0C0F24"/>
      <stop offset="100%" stop-color="#050609"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bitglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="300" height="300" rx="30" fill="url(#bg)"/>

  <!-- Spiral bits -->
  <g filter="url(#bitglow)">
    <rect x="162.00" y="139.43" width="2.80" height="2.80" fill="#FFFFFF" opacity="0.50" transform="rotate(-113.1,163.40,140.83)"/>
    <rect x="150.07" y="129.20" width="2.90" height="2.90" fill="#FFFFFF" opacity="0.70" transform="rotate(-164.2,151.52,130.65)"/>
    <rect x="131.53" y="132.48" width="3.19" height="3.19" fill="#FFFFFF" opacity="0.90" transform="rotate(-215.3,133.13,134.07)"/>
    <rect x="120.68" y="151.92" width="3.67" height="3.67" fill="#A8F0FF" opacity="0.91" transform="rotate(-266.5,122.52,153.76)"/>
    <rect x="130.71" y="176.22" width="4.36" height="4.36" fill="#A8F0FF" opacity="0.92" transform="rotate(-317.6,132.88,178.40)"/>
    <rect x="160.98" y="184.62" width="5.23" height="5.23" fill="#00CFFF" opacity="0.93" transform="rotate(-368.7,163.59,187.23)"/>
    <rect x="191.70" y="162.13" width="6.30" height="6.30" fill="#00CFFF" opacity="0.94" transform="rotate(-419.9,194.85,165.28)"/>
    <rect x="194.08" y="115.93" width="7.56" height="7.56" fill="#3388FF" opacity="0.95" transform="rotate(-471.0,197.86,119.71)"/>
    <rect x="153.20" y="78.22" width="9.02" height="9.02" fill="#3388FF" opacity="0.96" transform="rotate(-522.1,157.71,82.73)"/>
    <rect x="87.84" y="87.03" width="10.68" height="10.68" fill="#6655FF" opacity="0.97" transform="rotate(-573.3,93.17,92.36)"/>
    <rect x="47.47" y="153.40" width="12.52" height="12.52" fill="#6655FF" opacity="0.98" transform="rotate(-624.4,53.73,159.66)"/>
    <rect x="79.49" y="239.57" width="14.56" height="14.56" fill="#9944EE" opacity="0.70" transform="rotate(-675.6,86.78,246.85)"/>
    <rect x="184.33" y="273.10" width="16.80" height="16.80" fill="#9944EE" opacity="0.55" transform="rotate(-726.7,192.73,281.50)"/>
  </g>

  <!-- Core glow -->
  <g filter="url(#glow)">
    <circle cx="150.0" cy="150.0" r="36" fill="#00E5FF" opacity="0.12"/>
    <circle cx="150.0" cy="150.0" r="22" fill="#00E5FF" opacity="0.2"/>
    <circle cx="150.0" cy="150.0" r="12" fill="#00E5FF" opacity="0.35"/>
    <circle cx="150.0" cy="150.0" r="6" fill="#FFFFFF" opacity="0.65"/>
    <circle cx="150.0" cy="150.0" r="3" fill="#FFFFFF" opacity="1.0"/>
    
  </g>
</svg>